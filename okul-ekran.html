<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okul Dijital Tabela</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --navy:#0a1628;--navy2:#0f1e38;--accent:#f59e0b;--accent2:#10b981;
      --red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--text:#e2e8f0;--muted:#94a3b8;
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--navy);color:var(--text);font-family:'DM Sans',sans-serif;}
    #screen{display:grid;grid-template-rows:auto 1fr auto;height:100vh;width:100vw;}

    /* ── HEADER ── */
    .top-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
      background:var(--navy2);border-bottom:2px solid rgba(245,158,11,0.25);padding:12px 32px;gap:16px;}
    .okul-info{display:flex;align-items:center;gap:14px;}
    .okul-logo-icon{width:46px;height:46px;background:linear-gradient(135deg,var(--accent),#d97706);
      border-radius:11px;display:flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:#1a0a00;flex-shrink:0;}
    .okul-logo-img{width:46px;height:46px;border-radius:11px;object-fit:cover;display:none;}
    .okul-ad{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--accent);}
    .okul-tur{font-size:11px;color:var(--muted);}
    .clock-center{text-align:center;}
    .clock-time{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:#fff;line-height:1;
      text-shadow:0 0 40px rgba(245,158,11,0.5);letter-spacing:2px;}
    .clock-date{font-size:13px;color:var(--muted);margin-top:3px;}
    .ders-info{text-align:right;}
    .ders-no{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent);}
    .ders-txt{font-size:12px;color:var(--muted);}
    .ders-kalan{font-size:12px;color:var(--accent2);margin-top:2px;font-weight:700;}

    /* ── MAIN: Sol slayt + Sağ panel ── */
    .main{display:grid;grid-template-columns:1fr 340px;overflow:hidden;}

    /* ── SOL: SLAYT ── */
    .slide-area{position:relative;overflow:hidden;}

    /* Tek slayt */
    .slide{position:absolute;inset:0;display:flex;flex-direction:column;
      justify-content:center;align-items:center;padding:28px 70px;
      opacity:0;transition:opacity 0.7s ease;pointer-events:none;}
    .slide.active{opacity:1;pointer-events:auto;}
    .slide-nobet {background:radial-gradient(ellipse at 30% 50%,rgba(59,130,246,0.13) 0%,transparent 65%);}
    .slide-ders  {background:radial-gradient(ellipse at 70% 30%,rgba(245,158,11,0.11) 0%,transparent 65%);}
    .slide-etut  {background:radial-gradient(ellipse at 40% 60%,rgba(139,92,246,0.13) 0%,transparent 65%);}
    .slide-sinav {background:radial-gradient(ellipse at 60% 40%,rgba(239,68,68,0.13) 0%,transparent 65%);}
    .slide-deneme{background:radial-gradient(ellipse at 50% 50%,rgba(16,185,129,0.11) 0%,transparent 65%);}
    .slide-duyuru{background:radial-gradient(ellipse at 35% 55%,rgba(245,158,11,0.10) 0%,transparent 65%);}
    .slide-bos   {background:none;}
    .s-icon{font-size:64px;margin-bottom:14px;}
    .s-kat {font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .s-bas {font-family:'Syne',sans-serif;font-size:44px;font-weight:800;text-align:center;line-height:1.1;margin-bottom:10px;}
    .s-alt {font-size:16px;color:var(--muted);text-align:center;line-height:1.6;max-width:580px;}
    .s-badge{display:inline-flex;align-items:center;gap:7px;padding:7px 20px;border-radius:11px;font-size:14px;font-weight:700;margin-top:16px;}
    .b-blue{background:rgba(59,130,246,0.18);color:#93c5fd;border:1px solid rgba(59,130,246,0.3);}
    .b-acc {background:rgba(245,158,11,0.18);color:#fcd34d;border:1px solid rgba(245,158,11,0.3);}
    .b-grn {background:rgba(16,185,129,0.18);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3);}
    .b-red {background:rgba(239,68,68,0.18);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);}
    .b-pur {background:rgba(139,92,246,0.18);color:#c4b5fd;border:1px solid rgba(139,92,246,0.3);}
    .s-cards{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px;max-width:720px;}
    .s-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);
      border-radius:11px;padding:9px 16px;font-size:13px;font-weight:600;text-align:center;}
    .s-card-sub{font-size:10px;color:var(--muted);font-weight:400;margin-top:2px;}

    /* 3'lü triple slayt */
    .slide-triple{position:absolute;inset:0;display:none;
      opacity:0;transition:opacity 0.7s ease;pointer-events:none;}
    .slide-triple.active{opacity:1;pointer-events:auto;display:flex;}
    .t-col{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
      padding:24px 28px;position:relative;}
    .t-col.tip-duyuru{background:radial-gradient(ellipse at 50% 40%,rgba(245,158,11,0.08) 0%,transparent 70%);}
    .t-col.tip-bos{background:none;}
    .t-col::after{content:"";position:absolute;right:0;top:10%;bottom:10%;
      width:1px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.10),transparent);}
    .t-col:last-child::after{display:none;}
    .t-icon{font-size:40px;margin-bottom:10px;}
    .t-kat {font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;text-align:center;}
    .t-bas {font-family:'Syne',sans-serif;font-size:20px;font-weight:800;text-align:center;line-height:1.25;margin-bottom:8px;}
    .t-alt {font-size:13px;color:var(--muted);text-align:center;line-height:1.55;max-width:280px;}
    .t-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:8px;font-size:12px;font-weight:700;margin-top:10px;}

    /* Progress + Dots */
    .slide-progress{position:absolute;bottom:0;left:0;height:4px;
      background:linear-gradient(90deg,var(--accent),#d97706);transition:width linear;
      border-radius:0 2px 2px 0;z-index:10;}
    .slide-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
      display:flex;gap:6px;z-index:10;}
    .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.3s;cursor:pointer;}
    .dot.active{background:var(--accent);width:22px;border-radius:3px;}

    /* ── SAĞ PANEL ── */
    .side-panel{background:var(--navy2);border-left:1px solid rgba(255,255,255,0.07);
      display:flex;flex-direction:column;overflow-y:auto;}
    .side-panel::-webkit-scrollbar{display:none;}
    .side-sec{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,0.06);}
    .side-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
      color:var(--muted);margin-bottom:10px;}

    /* Ders listesi */
    .dr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
    .dr:last-child{border-bottom:none;}
    .dr-no{font-size:10px;font-weight:700;color:var(--accent);background:rgba(245,158,11,0.10);
      border-radius:5px;padding:2px 6px;flex-shrink:0;}
    .dr-ad{font-weight:600;flex:1;font-size:12px;}
    .dr-ogr{font-size:10px;color:var(--muted);}
    .dr-sinif{font-size:10px;color:var(--muted);background:rgba(255,255,255,0.05);border-radius:4px;padding:2px 5px;flex-shrink:0;}
    .dr.aktif{background:rgba(245,158,11,0.07);border-radius:7px;padding:6px 7px;margin:0 -7px;}

    /* Nöbet listesi */
    .nr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
    .nr:last-child{border-bottom:none;}
    .nr-ad{font-weight:600;flex:1;}
    .nr-yer{font-size:10px;color:#93c5fd;background:rgba(59,130,246,0.10);border-radius:5px;padding:2px 7px;}

    /* Etkinlik listesi */
    .er{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
    .er:last-child{border-bottom:none;}
    .er-ad{font-weight:600;flex:1;}
    .er-saat{font-size:10px;color:var(--accent2);background:rgba(16,185,129,0.10);border-radius:5px;padding:2px 6px;flex-shrink:0;}

    /* ── FOOTER / TICKER ── */
    .bottom-bar{background:#07101f;border-top:2px solid rgba(245,158,11,0.28);
      display:flex;align-items:stretch;height:52px;}
    .f-live{display:flex;align-items:center;gap:7px;padding:0 20px;
      border-right:1px solid rgba(255,255,255,0.07);flex-shrink:0;
      font-size:10px;font-weight:800;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);
      box-shadow:0 0 8px var(--accent2);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(0.7)}}
    .ticker-wrap{flex:1;overflow:hidden;display:flex;align-items:center;position:relative;}
    .ticker-wrap::before,.ticker-wrap::after{content:"";position:absolute;top:0;bottom:0;width:50px;z-index:2;pointer-events:none;}
    .ticker-wrap::before{left:0;background:linear-gradient(to right,#07101f,transparent);}
    .ticker-wrap::after {right:0;background:linear-gradient(to left,#07101f,transparent);}
    .ticker{display:flex;white-space:nowrap;animation:ticker 40s linear infinite;}
    .ticker:hover{animation-play-state:paused;}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .ti{display:inline-flex;align-items:center;gap:9px;padding:0 28px;border-right:1px solid rgba(255,255,255,0.07);}
    .ti-ikon{font-size:17px;}
    .ti-bas{font-weight:700;font-size:14px;color:#fff;}
    .ti-alt{font-size:12px;color:var(--muted);}
    .f-saat{display:flex;align-items:center;padding:0 20px;border-left:1px solid rgba(255,255,255,0.07);
      flex-shrink:0;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--accent);}

    /* LOADING */
    #loadingScreen{position:fixed;inset:0;background:var(--navy);display:flex;
      align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;}
    .spinner{width:46px;height:46px;border:3px solid rgba(245,158,11,0.2);
      border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:14px;margin-top:6px">Veriler yükleniyor...</div>
</div>

<div id="screen" style="display:none">

  <!-- HEADER -->
  <div class="top-bar">
    <div class="okul-info">
      <div class="okul-logo-icon" id="logoIcon">O</div>
      <img class="okul-logo-img" id="logoImg" src="" alt="">
      <div>
        <div class="okul-ad" id="okulAd">OkulPanel</div>
        <div class="okul-tur" id="okulTur">Okul Yönetim Sistemi</div>
      </div>
    </div>
    <div class="clock-center">
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-date" id="clockDate"></div>
    </div>
    <div class="ders-info">
      <div class="ders-no" id="dersNo">—</div>
      <div class="ders-txt" id="dersTxt">Ders saati</div>
      <div class="ders-kalan" id="dersKalan"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- Sol: slaytlar -->
    <div class="slide-area" id="slideArea">
      <div class="slide-progress" id="slideProgress" style="width:0%"></div>
      <div class="slide-dots" id="slideDots"></div>
    </div>
    <!-- Sağ: sabit panel -->
    <div class="side-panel" id="sidePanel"></div>
  </div>

  <!-- FOOTER -->
  <div class="bottom-bar">
    <div class="f-live"><div class="live-dot"></div>CANLI</div>
    <div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>
    <div class="f-saat" id="footerSaat">00:00</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, query, orderBy, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtrcgZ8njUu9mH5sf2DdRG69hHnzI9jOY",
  authDomain: "okul-yonetim-serkanugur.firebaseapp.com",
  projectId: "okul-yonetim-serkanugur",
  storageBucket: "okul-yonetim-serkanugur.firebasestorage.app",
  messagingSenderId: "60840896294",
  appId: "1:60840896294:web:08dd79ab2368ca506203e7"
};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const GUNLER=["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
const SAATLER=[
  {no:1,bas:"08:00",bit:"08:40"},{no:2,bas:"08:50",bit:"09:30"},
  {no:3,bas:"09:40",bit:"10:20"},{no:4,bas:"10:30",bit:"11:10"},
  {no:5,bas:"11:20",bit:"12:00"},{no:6,bas:"13:00",bit:"13:40"},
  {no:7,bas:"13:50",bit:"14:30"},{no:8,bas:"14:40",bit:"15:20"},
];
const TR_GUN=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const TR_AY=["","Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const SURE_TEK=8000, SURE_TRIPLE=90000;

let okulData={},nobetler=[],etutler=[],sinavlar=[],denemeler=[],duyurular=[],programData={};
let slides=[],slideIndex=0,slideTimer=null;

function toMin(s){const[h,m]=s.split(":").map(Number);return h*60+m;}
function simdiMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function bugunTarih(){return new Date().toISOString().split("T")[0];}
function yarinTarih(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split("T")[0];}
function tarihFormat(t){if(!t)return"";const[y,m,g]=t.split("-");return g+"/"+m+"/"+y;}
function bugunFirestoreGun(){const g=new Date().getDay();return(g>=1&&g<=5)?GUNLER[g-1]:null;}
function aktifDers(){
  const sim=simdiMin();
  for(const ds of SAATLER){
    const b=toMin(ds.bas),e=toMin(ds.bit);
    if(sim>=b&&sim<=e)return{...ds,durum:"aktif"};
    if(sim<b)return{...ds,durum:"sonraki"};
  }
  return null;
}

function guncelSaat(){
  const n=new Date();
  const hh=String(n.getHours()).padStart(2,"0"),mm=String(n.getMinutes()).padStart(2,"0"),ss=String(n.getSeconds()).padStart(2,"0");
  document.getElementById("clockTime").textContent=hh+":"+mm+":"+ss;
  document.getElementById("footerSaat").textContent=hh+":"+mm;
  document.getElementById("clockDate").textContent=TR_GUN[n.getDay()]+" · "+n.getDate()+" "+TR_AY[n.getMonth()+1]+" "+n.getFullYear();
  const ds=aktifDers();
  if(!ds){
    document.getElementById("dersNo").textContent="—";
    document.getElementById("dersTxt").textContent="Ders saati dışı";
    document.getElementById("dersKalan").textContent="";
  } else if(ds.durum==="aktif"){
    document.getElementById("dersNo").textContent=ds.no+". Ders";
    document.getElementById("dersTxt").textContent=ds.bas+" – "+ds.bit;
    document.getElementById("dersKalan").textContent="⏱ "+(toMin(ds.bit)-simdiMin())+" dk kaldı";
  } else {
    document.getElementById("dersNo").textContent=ds.no+". Ders";
    document.getElementById("dersTxt").textContent="Başlıyor: "+ds.bas;
    document.getElementById("dersKalan").textContent=(toMin(ds.bas)-simdiMin())+" dk sonra";
  }
}
setInterval(guncelSaat,1000); guncelSaat();

// Okul bilgisi
onSnapshot(doc(db,"ayarlar","okul"),snap=>{
  if(!snap.exists())return; const d=snap.data(); okulData=d;
  if(d.ad)document.getElementById("okulAd").textContent=d.ad;
  if(d.tur)document.getElementById("okulTur").textContent=d.tur;
  if(d.logo){
    const img=document.getElementById("logoImg"),ic=document.getElementById("logoIcon");
    img.src=d.logo;img.style.display="block";ic.style.display="none";
  }
});

// Veri dinleyicileri — duyurular orderBy kaldırıldı, client-side sort yapılıyor
onSnapshot(collection(db,"nobetler"),snap=>{nobetler=snap.docs.map(d=>({id:d.id,...d.data()}));buildAll();});
onSnapshot(collection(db,"etut"),snap=>{
  etutler=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.tarih||"").localeCompare(b.tarih||""));buildAll();});
onSnapshot(collection(db,"sinavlar"),snap=>{
  sinavlar=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.tarih||"").localeCompare(b.tarih||""));buildAll();});
onSnapshot(collection(db,"deneme"),snap=>{
  denemeler=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.tarih||"").localeCompare(b.tarih||""));buildAll();});
// Duyurular: orderBy yerine collection + client sort (index hatası olmaması için)
onSnapshot(collection(db,"duyurular"),snap=>{
  duyurular=snap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=>{
      const ta=a.ts?.seconds||a.ts?.toMillis?.()/1000||0;
      const tb=b.ts?.seconds||b.ts?.toMillis?.()/1000||0;
      return tb-ta;
    });
  buildAll();
});
onSnapshot(collection(db,"program"),snap=>{programData={};snap.docs.forEach(d=>{programData[d.id]=d.data();});buildAll();});

setTimeout(()=>{
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("screen").style.display="grid";
},2000);

function buildAll(){buildSlides();renderSidePanel();updateTicker();}

// ── SLAYTLAR ──
function buildSlides(){
  const bugun=bugunTarih();
  const bugunGun=bugunFirestoreGun();
  const aktDs=aktifDers();
  const yeni=[];

  // 1. Bugünkü nöbetçiler
  const bugunNob=bugunGun?nobetler.filter(n=>n.gun===bugunGun):[];
  if(bugunNob.length){
    yeni.push({tip:"tek",cls:"slide-nobet",icon:"🛡️",kat:"BUGÜN NÖBETÇİ ÖĞRETMENLER",
      bas:"Nöbet Görevi",
      alt:bugunNob.map(n=>n.ogretmen+(n.konum?" · "+n.konum:"")).join("  /  "),
      kartlar:bugunNob.map(n=>({label:n.ogretmen,sub:n.konum||"",extra:n.saat||""})),
      badge:{cls:"b-blue",ikon:"📍",yazi:bugunNob.map(n=>n.konum).filter(Boolean).join(", ")||"Görevde"},
      sure:SURE_TEK});
  }

  // 2. Aktif ders saati
  if(aktDs&&aktDs.durum==="aktif"&&bugunGun){
    const dl=[];
    Object.entries(programData).forEach(([sinif,prog])=>{
      const obj=prog[bugunGun]?.[aktDs.no-1];
      const ders=typeof obj==="object"?obj.ders:obj;
      const ogr=typeof obj==="object"?(obj.ogretmen||""):"";
      if(ders&&ders!=="—")dl.push({sinif,ders,ogretmen:ogr});
    });
    if(dl.length){
      yeni.push({tip:"tek",cls:"slide-ders",icon:"📚",
        kat:aktDs.no+". DERS · "+aktDs.bas+" – "+aktDs.bit,
        bas:"Devam Eden Dersler",alt:"",
        kartlar:dl.map(d=>({label:d.sinif,sub:d.ders,extra:d.ogretmen})),
        badge:{cls:"b-acc",ikon:"⏱",yazi:aktDs.bit+" bitişi"},
        sure:SURE_TEK});
    }
  }

  // 3. Bugünkü etütler
  etutler.filter(e=>e.tarih===bugun).forEach(e=>{
    const ogrSay=e.ogrencilerDetay?.length||e.ogrenciler?.length||0;
    yeni.push({tip:"tek",cls:"slide-etut",icon:"📖",kat:"BUGÜN ETÜT",
      bas:e.baslik||e.ders||"Etüt",
      alt:[e.saat,e.yer,e.ogretmen].filter(Boolean).join(" · "),
      kartlar:(e.ogrencilerDetay||[]).slice(0,12).map(o=>({label:o.ad,sub:o.sinif,extra:""})),
      badge:{cls:"b-pur",ikon:"👨‍🎓",yazi:ogrSay>0?ogrSay+" öğrenci":(e.sinif||"")},
      sure:SURE_TEK});
  });

  // 4. Bugünkü sınavlar
  sinavlar.filter(s=>s.tarih===bugun).forEach(s=>{
    yeni.push({tip:"tek",cls:"slide-sinav",icon:"📋",kat:"BUGÜN SINAV",
      bas:s.ders||"Sınav",
      alt:[s.saat,s.salon,s.ogretmen].filter(Boolean).join(" · "),
      kartlar:(s.siniflar||[]).map(sf=>({label:sf,sub:"",extra:""})),
      badge:{cls:"b-red",ikon:"📝",yazi:s.tur==="ulke"?"Ülke Geneli":"Yazılı Sınav"},
      sure:SURE_TEK});
  });

  // 5. Bugünkü denemeler
  denemeler.filter(d=>d.tarih===bugun).forEach(d=>{
    yeni.push({tip:"tek",cls:"slide-deneme",icon:"🎯",kat:"BUGÜN DENEME",
      bas:[d.tur,d.seri].filter(Boolean).join(" – ")||"Deneme Sınavı",
      alt:[d.saat,d.yer].filter(Boolean).join(" · "),
      kartlar:(d.siniflar||[]).map(sf=>({label:sf,sub:"",extra:""})),
      badge:{cls:"b-grn",ikon:"⏱",yazi:d.sure||"Tüm Sınıflar"},
      sure:SURE_TEK});
  });

  // 6. TRIPLE — Duyurular (3'er grup, 90 sn)
  const aktifDuy=duyurular.filter(d=>d.hedef==="tumu"||d.hedef==="ogrenci");
  for(let i=0;i<aktifDuy.length;i+=3){
    const grup=aktifDuy.slice(i,i+3);
    while(grup.length<3)grup.push(null);
    yeni.push({
      tip:"triple",sure:SURE_TRIPLE,
      cols:grup.map(d=>d?{
        cls:"tip-duyuru",
        icon:d.oncelik==="yuksek"?"🔴":d.oncelik==="normal"?"📢":"📌",
        kat:"DUYURU · "+(d.tarihStr||""),
        bas:d.baslik||"",
        alt:(d.icerik||"").substring(0,130)+((d.icerik||"").length>130?"…":""),
        badge:{cls:d.oncelik==="yuksek"?"b-red":d.oncelik==="normal"?"b-blue":"b-acc",
               ikon:"📅",yazi:d.tarihStr||""}
      }:{cls:"tip-bos",icon:"",kat:"",bas:"",alt:"",badge:null})
    });
  }

  // 7. Yarın sınav hatırlatma
  sinavlar.filter(s=>s.tarih===yarinTarih()).forEach(s=>{
    yeni.push({tip:"tek",cls:"slide-sinav",icon:"⚠️",kat:"YARIN SINAV — HATIRLATMA",
      bas:s.ders||"Sınav",
      alt:"Tarih: "+tarihFormat(s.tarih)+" · "+(s.saat||""),
      kartlar:(s.siniflar||[]).map(sf=>({label:sf,sub:"",extra:""})),
      badge:{cls:"b-acc",ikon:"📅",yazi:"Yarın"},
      sure:SURE_TEK});
  });

  // 8. Yaklaşan etütler
  etutler.filter(e=>e.tarih>bugun).slice(0,2).forEach(e=>{
    const ogrSay=e.ogrencilerDetay?.length||e.ogrenciler?.length||0;
    yeni.push({tip:"tek",cls:"slide-etut",icon:"📖",kat:"YAKLAŞAN ETÜT · "+tarihFormat(e.tarih),
      bas:e.baslik||e.ders||"Etüt",
      alt:[e.saat,e.yer,e.ogretmen].filter(Boolean).join(" · "),
      kartlar:[],
      badge:{cls:"b-pur",ikon:"👨‍🎓",yazi:ogrSay>0?ogrSay+" öğrenci":(e.sinif||"")},
      sure:SURE_TEK});
  });

  if(!yeni.length){
    yeni.push({tip:"tek",cls:"slide-bos",icon:"🏫",kat:"",
      bas:okulData.ad||"OkulPanel",alt:"Bugün için planlanmış etkinlik bulunmuyor.",
      kartlar:[],badge:null,sure:SURE_TEK});
  }

  slides=yeni;
  if(slideIndex>=slides.length)slideIndex=0;
  renderSlides();
  renderDots();
  if(!slideTimer)startSlideShow();
}

function renderSlides(){
  const area=document.getElementById("slideArea");
  Array.from(area.children).forEach(c=>{
    if(!c.classList.contains("slide-progress")&&!c.classList.contains("slide-dots"))c.remove();
  });
  const prog=document.getElementById("slideProgress");
  slides.forEach((s,i)=>{
    area.insertBefore(s.tip==="triple"?buildTriple(s,i):buildTek(s,i),prog);
  });
}

function buildTek(s,i){
  const div=document.createElement("div");
  div.className="slide "+s.cls+(i===slideIndex?" active":"");
  let h="";
  if(s.icon)h+='<div class="s-icon">'+s.icon+'</div>';
  if(s.kat) h+='<div class="s-kat">'+s.kat+'</div>';
  h+='<div class="s-bas">'+s.bas+'</div>';
  if(s.alt) h+='<div class="s-alt">'+s.alt+'</div>';
  if(s.kartlar&&s.kartlar.length){
    h+='<div class="s-cards">';
    s.kartlar.forEach(k=>{
      h+='<div class="s-card"><div>'+k.label+'</div>';
      if(k.sub)  h+='<div class="s-card-sub">'+k.sub+'</div>';
      if(k.extra)h+='<div class="s-card-sub" style="color:var(--accent)">'+k.extra+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  if(s.badge)h+='<div class="s-badge '+s.badge.cls+'">'+s.badge.ikon+' '+s.badge.yazi+'</div>';
  div.innerHTML=h;
  return div;
}

function buildTriple(s,i){
  const div=document.createElement("div");
  div.className="slide-triple"+(i===slideIndex?" active":"");
  let h="";
  s.cols.forEach(col=>{
    if(!col||!col.bas){h+='<div class="t-col tip-bos"></div>';return;}
    h+='<div class="t-col '+col.cls+'">';
    if(col.icon)h+='<div class="t-icon">'+col.icon+'</div>';
    if(col.kat) h+='<div class="t-kat">'+col.kat+'</div>';
    h+='<div class="t-bas">'+col.bas+'</div>';
    if(col.alt) h+='<div class="t-alt">'+col.alt+'</div>';
    if(col.badge)h+='<div class="t-badge '+col.badge.cls+'">'+col.badge.ikon+' '+col.badge.yazi+'</div>';
    h+='</div>';
  });
  div.innerHTML=h;
  return div;
}

function renderDots(){
  document.getElementById("slideDots").innerHTML=
    slides.map((_,i)=>'<div class="dot'+(i===slideIndex?" active":"")+'" onclick="window.goSlide('+i+')"></div>').join("");
}
window.goSlide=function(i){slideIndex=i;showSlide();clearTimeout(slideTimer);scheduleNext();};

function showSlide(){
  document.querySelectorAll(".slide,.slide-triple").forEach((el,i)=>el.classList.toggle("active",i===slideIndex));
  renderDots();
  startProgress(slides[slideIndex]?.sure||SURE_TEK);
}
function startSlideShow(){scheduleNext();startProgress(slides[0]?.sure||SURE_TEK);}
function scheduleNext(){
  const sure=slides[slideIndex]?.sure||SURE_TEK;
  slideTimer=setTimeout(()=>{slideIndex=(slideIndex+1)%slides.length;showSlide();scheduleNext();},sure);
}
function startProgress(sure){
  const bar=document.getElementById("slideProgress");
  bar.style.transition="none";bar.style.width="0%";
  setTimeout(()=>{bar.style.transition="width "+sure+"ms linear";bar.style.width="100%";},50);
}

// ── SAĞ PANEL ──
function renderSidePanel(){
  const panel=document.getElementById("sidePanel");
  const bugunGun=bugunFirestoreGun();
  const bugun=bugunTarih();
  const aktDs=aktifDers();
  let h="";

  // Bugünkü ders programı
  h+='<div class="side-sec"><div class="side-title">📚 Bugünün Programı</div>';
  if(!bugunGun){
    h+='<div style="color:var(--muted);font-size:12px">Hafta sonu — ders yok.</div>';
  } else {
    let bulundu=false;
    Object.keys(programData).sort().forEach(sinif=>{
      const prog=programData[sinif];
      SAATLER.forEach((ds,idx)=>{
        const obj=prog[bugunGun]?.[idx];
        const ders=typeof obj==="object"?obj.ders:obj;
        const ogr=typeof obj==="object"?(obj.ogretmen||""):"";
        if(!ders||ders==="—")return;
        bulundu=true;
        const aktif=aktDs&&aktDs.no===ds.no&&aktDs.durum==="aktif";
        h+='<div class="dr'+(aktif?" aktif":"")+'"><span class="dr-no">'+ds.no+'.</span>';
        h+='<div style="flex:1"><div class="dr-ad">'+ders+'</div>';
        if(ogr)h+='<div class="dr-ogr">'+ogr+'</div>';
        h+='</div><span class="dr-sinif">'+sinif+'</span></div>';
      });
    });
    if(!bulundu)h+='<div style="color:var(--muted);font-size:12px">Program girilmemiş.</div>';
  }
  h+='</div>';

  // Bugünkü nöbetler
  const bugunNob=bugunGun?nobetler.filter(n=>n.gun===bugunGun):[];
  h+='<div class="side-sec"><div class="side-title">🛡️ Bugünkü Nöbetler</div>';
  if(!bugunNob.length){
    h+='<div style="color:var(--muted);font-size:12px">Nöbet kaydı yok.</div>';
  } else {
    bugunNob.forEach(n=>{
      h+='<div class="nr"><div class="nr-ad">'+n.ogretmen;
      if(n.brans)h+='<div style="font-size:10px;color:var(--muted)">'+n.brans+'</div>';
      h+='</div><span class="nr-yer">'+(n.konum||"")+'</span></div>';
    });
  }
  h+='</div>';

  // Bugünkü etkinlikler
  const bugunEtut=etutler.filter(e=>e.tarih===bugun);
  const bugunSinav=sinavlar.filter(s=>s.tarih===bugun);
  const bugunDeneme=denemeler.filter(d=>d.tarih===bugun);
  const hepsi=[
    ...bugunSinav.map(s=>({ikon:"📋",ad:s.ders||"Sınav",saat:s.saat||""})),
    ...bugunDeneme.map(d=>({ikon:"🎯",ad:[d.tur,d.seri].filter(Boolean).join(" ")||"Deneme",saat:d.saat||""})),
    ...bugunEtut.map(e=>({ikon:"📖",ad:e.baslik||e.ders||"Etüt",saat:e.saat||""})),
  ].sort((a,b)=>(a.saat).localeCompare(b.saat));

  if(hepsi.length){
    h+='<div class="side-sec"><div class="side-title">📅 Bugünkü Etkinlikler</div>';
    hepsi.forEach(e=>{
      h+='<div class="er"><span style="font-size:15px">'+e.ikon+'</span>';
      h+='<span class="er-ad">'+e.ad+'</span>';
      if(e.saat)h+='<span class="er-saat">'+e.saat+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Son duyurular (3 adet)
  const sonDuy=duyurular.filter(d=>d.hedef==="tumu"||d.hedef==="ogrenci").slice(0,3);
  if(sonDuy.length){
    h+='<div class="side-sec"><div class="side-title">📢 Son Duyurular</div>';
    sonDuy.forEach(d=>{
      const renk=d.oncelik==="yuksek"?"#fca5a5":d.oncelik==="normal"?"#93c5fd":"#94a3b8";
      h+='<div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)">';
      h+='<div style="font-size:12px;font-weight:700;color:'+renk+'">'+d.baslik+'</div>';
      h+='<div style="font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4">'+(d.icerik||"").substring(0,70)+'...</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  panel.innerHTML=h;
}

// ── TICKER ──
function updateTicker(){
  const bugun=bugunTarih();
  const items=[];
  sinavlar.filter(s=>s.tarih>=bugun).slice(0,4).forEach(s=>{
    items.push({ikon:"📋",bas:s.ders+" Sınavı",alt:tarihFormat(s.tarih)+(s.siniflar?" · "+s.siniflar.join(", "):"")});
  });
  denemeler.filter(d=>d.tarih>=bugun).slice(0,3).forEach(d=>{
    items.push({ikon:"🎯",bas:[d.tur,d.seri].filter(Boolean).join(" ")||"Deneme",alt:tarihFormat(d.tarih)});
  });
  etutler.filter(e=>e.tarih>=bugun).slice(0,3).forEach(e=>{
    items.push({ikon:"📖",bas:e.baslik||e.ders||"Etüt",alt:tarihFormat(e.tarih)+(e.yer?" · "+e.yer:"")});
  });
  duyurular.filter(d=>d.hedef==="tumu").slice(0,4).forEach(d=>{
    items.push({ikon:"📢",bas:d.baslik,alt:(d.icerik||"").substring(0,60)});
  });
  if(!items.length)items.push({ikon:"🏫",bas:okulData.ad||"OkulPanel",alt:"İyi dersler!"});
  const html=items.map(it=>
    '<span class="ti"><span class="ti-ikon">'+it.ikon+'</span>'+
    '<span class="ti-bas">'+it.bas+'</span>'+
    (it.alt?'<span class="ti-alt">'+it.alt+'</span>':'')+
    '</span>'
  ).join("");
  document.getElementById("ticker").innerHTML=html+html;
}

setInterval(buildAll,60000);
</script>
