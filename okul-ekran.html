<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okul Dijital Tabela</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --navy:#0a1628;--navy2:#0f1e38;--accent:#f59e0b;--accent2:#10b981;
      --red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--text:#e2e8f0;--muted:#64748b;
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--navy);color:var(--text);font-family:'DM Sans',sans-serif;}

    /* ── LAYOUT ── */
    #screen{display:grid;grid-template-rows:auto 1fr auto;height:100vh;width:100vw;}

    /* ── HEADER ── */
    .top-bar{
      display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
      background:var(--navy2);border-bottom:2px solid rgba(245,158,11,0.3);
      padding:14px 32px;gap:16px;
    }
    .okul-info{display:flex;align-items:center;gap:14px;}
    .okul-logo{width:52px;height:52px;border-radius:12px;object-fit:cover;display:none;}
    .okul-logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),#d97706);
      border-radius:12px;display:flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#1a0a00;flex-shrink:0;}
    .okul-ad{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);}
    .okul-tur{font-size:12px;color:var(--muted);}

    /* Saat merkez */
    .clock-center{text-align:center;}
    .clock-time{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:#fff;line-height:1;
      text-shadow:0 0 30px rgba(245,158,11,0.4);}
    .clock-date{font-size:14px;color:var(--muted);margin-top:4px;font-weight:500;}

    /* Sağ ders saati */
    .ders-saati-info{text-align:right;}
    .ders-saati-no{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent);}
    .ders-saati-txt{font-size:13px;color:var(--muted);}
    .ders-saati-kalan{font-size:12px;color:var(--accent2);margin-top:2px;font-weight:600;}

    /* ── MAIN CONTENT ── */
    .main{display:grid;grid-template-columns:1fr 380px;gap:0;overflow:hidden;}

    /* Sol: slayt alanı */
    .slide-area{position:relative;overflow:hidden;border-right:1px solid rgba(255,255,255,0.06);}
    .slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;
      padding:40px 50px;opacity:0;transition:opacity 0.8s ease;pointer-events:none;}
    .slide.active{opacity:1;pointer-events:auto;}

    /* Slide tiplerine göre arka planlar */
    .slide-nobet{background:radial-gradient(ellipse at 30% 50%,rgba(59,130,246,0.15) 0%,transparent 70%);}
    .slide-ders{background:radial-gradient(ellipse at 70% 30%,rgba(245,158,11,0.12) 0%,transparent 70%);}
    .slide-etut{background:radial-gradient(ellipse at 40% 60%,rgba(139,92,246,0.15) 0%,transparent 70%);}
    .slide-sinav{background:radial-gradient(ellipse at 60% 40%,rgba(239,68,68,0.15) 0%,transparent 70%);}
    .slide-deneme{background:radial-gradient(ellipse at 50% 50%,rgba(16,185,129,0.12) 0%,transparent 70%);}
    .slide-duyuru{background:radial-gradient(ellipse at 35% 55%,rgba(245,158,11,0.12) 0%,transparent 70%);}
    .slide-bos{background:none;}

    .slide-icon{font-size:80px;margin-bottom:20px;filter:drop-shadow(0 0 20px rgba(255,255,255,0.2));}
    .slide-kategori{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
      color:var(--muted);margin-bottom:12px;}
    .slide-baslik{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;text-align:center;
      line-height:1.15;margin-bottom:16px;}
    .slide-alt{font-size:18px;color:var(--muted);text-align:center;line-height:1.6;max-width:600px;}
    .slide-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:12px;
      font-size:14px;font-weight:700;margin-top:20px;}
    .badge-blue{background:rgba(59,130,246,0.2);color:#93c5fd;border:1px solid rgba(59,130,246,0.3);}
    .badge-acc{background:rgba(245,158,11,0.2);color:#fcd34d;border:1px solid rgba(245,158,11,0.3);}
    .badge-grn{background:rgba(16,185,129,0.2);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3);}
    .badge-red{background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);}
    .badge-pur{background:rgba(139,92,246,0.2);color:#c4b5fd;border:1px solid rgba(139,92,246,0.3);}

    /* Çoklu kart (öğrenci listesi, nöbet listesi) */
    .slide-cards{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:16px;max-width:750px;}
    .mini-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;padding:10px 18px;font-size:15px;font-weight:600;}

    /* Progress bar */
    .slide-progress{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);
      transition:width linear;border-radius:0 2px 2px 0;}

    /* Slide göstergeleri */
    .slide-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
      display:flex;gap:6px;}
    .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.3s;}
    .dot.active{background:var(--accent);width:20px;border-radius:3px;}

    /* ── SAĞ PANEL ── */
    .side-panel{display:flex;flex-direction:column;gap:0;overflow-y:auto;background:var(--navy2);}
    .side-panel::-webkit-scrollbar{display:none;}

    .side-section{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.06);}
    .side-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;
      text-transform:uppercase;color:var(--muted);margin-bottom:12px;}

    /* Ders programı şeridi */
    .ders-row{display:flex;align-items:center;gap:10px;padding:7px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
    .ders-row:last-child{border-bottom:none;}
    .ders-saat-badge{font-size:11px;font-weight:700;color:var(--accent);background:rgba(245,158,11,0.1);
      border-radius:6px;padding:3px 7px;white-space:nowrap;flex-shrink:0;}
    .ders-ad{font-weight:600;flex:1;}
    .ders-ogr{font-size:11px;color:var(--muted);}
    .ders-sinif-badge{font-size:10px;color:var(--muted);background:rgba(255,255,255,0.05);
      border-radius:4px;padding:2px 6px;flex-shrink:0;}
    .ders-aktif{background:rgba(245,158,11,0.07);border-radius:8px;padding:7px 8px;margin:0 -8px;}

    /* Nöbet şeridi */
    .nobet-row{display:flex;align-items:center;gap:10px;padding:6px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
    .nobet-row:last-child{border-bottom:none;}
    .nobet-ad{font-weight:600;flex:1;}
    .nobet-yer{font-size:11px;color:var(--blue);background:rgba(59,130,246,0.1);
      border-radius:6px;padding:2px 8px;}

    /* Etüt/sınav/deneme şeridi */
    .etkinlik-row{display:flex;align-items:center;gap:10px;padding:7px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
    .etkinlik-row:last-child{border-bottom:none;}
    .etkinlik-saat{font-size:11px;font-weight:700;color:var(--accent2);background:rgba(16,185,129,0.1);
      border-radius:6px;padding:2px 7px;flex-shrink:0;}
    .etkinlik-ad{font-weight:600;flex:1;}
    .etkinlik-yer{font-size:11px;color:var(--muted);}

    /* ── FOOTER ── */
    .bottom-bar{
      background:var(--navy2);border-top:1px solid rgba(255,255,255,0.06);
      padding:10px 32px;display:flex;align-items:center;justify-content:space-between;
    }
    .ticker-wrap{flex:1;overflow:hidden;margin:0 24px;}
    .ticker{display:flex;gap:60px;animation:ticker 30s linear infinite;white-space:nowrap;}
    .ticker:hover{animation-play-state:paused;}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .ticker-item{font-size:13px;color:var(--muted);}
    .ticker-item span{color:var(--text);font-weight:600;}
    .footer-left{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);
      animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(0.8)}}
    .footer-right{font-size:12px;color:var(--muted);}

    /* ── BEKLEME EKRANI ── */
    #loadingScreen{position:fixed;inset:0;background:var(--navy);display:flex;
      align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999;}
    .spinner{width:48px;height:48px;border:3px solid rgba(245,158,11,0.2);
      border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:14px">Veriler yükleniyor...</div>
</div>

<div id="screen" style="display:none">

  <!-- HEADER -->
  <div class="top-bar">
    <div class="okul-info">
      <div class="okul-logo-icon" id="logoIcon">O</div>
      <img class="okul-logo" id="logoImg" src="" alt="">
      <div>
        <div class="okul-ad" id="okulAd">OkulPanel</div>
        <div class="okul-tur" id="okulTur">Okul Yönetim Sistemi</div>
      </div>
    </div>
    <div class="clock-center">
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-date" id="clockDate"></div>
    </div>
    <div class="ders-saati-info">
      <div class="ders-saati-no" id="dersSaatiNo">—</div>
      <div class="ders-saati-txt" id="dersSaatiTxt">Ders saati</div>
      <div class="ders-saati-kalan" id="dersSaatiKalan"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Sol: Slaytlar -->
    <div class="slide-area" id="slideArea">
      <!-- Slaytlar JS ile oluşturulur -->
      <div class="slide-progress" id="slideProgress" style="width:0%"></div>
      <div class="slide-dots" id="slideDots"></div>
    </div>

    <!-- Sağ: Sabit bilgi paneli -->
    <div class="side-panel" id="sidePanel">
      <!-- JS ile doldurulur -->
    </div>

  </div>

  <!-- FOOTER ticker -->
  <div class="bottom-bar">
    <div class="footer-left">
      <div class="live-dot"></div>
      Canlı Yayın
    </div>
    <div class="ticker-wrap">
      <div class="ticker" id="ticker">
        <!-- JS ile doldurulur -->
      </div>
    </div>
    <div class="footer-right" id="footerSaat"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, query, orderBy, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtrcgZ8njUu9mH5sf2DdRG69hHnzI9jOY",
  authDomain: "okul-yonetim-serkanugur.firebaseapp.com",
  projectId: "okul-yonetim-serkanugur",
  storageBucket: "okul-yonetim-serkanugur.firebasestorage.app",
  messagingSenderId: "60840896294",
  appId: "1:60840896254:web:08dd79ab2368ca506203e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── SABİTLER ──
const GUNLER = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma"];
const SAATLER = [
  {no:1, bas:"08:00", bit:"08:40"},
  {no:2, bas:"08:50", bit:"09:30"},
  {no:3, bas:"09:40", bit:"10:20"},
  {no:4, bas:"10:30", bit:"11:10"},
  {no:5, bas:"11:20", bit:"12:00"},
  {no:6, bas:"13:00", bit:"13:40"},
  {no:7, bas:"13:50", bit:"14:30"},
  {no:8, bas:"14:40", bit:"15:20"},
];
const TR_GUNLER = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const TR_AYLAR  = ["","Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const SLIDE_SURE = 7000; // ms

// ── VERİ ──
let okulData = {};
let nobetler = [];
let etutler = [];
let sinavlar = [];
let denemeler = [];
let duyurular = [];
let programData = {};
let slides = [];
let slideIndex = 0;
let slideTimer = null;
let progressTimer = null;
let progressStart = null;

// ── SAAT ──
function sureToMin(s){const[h,m]=s.split(":").map(Number);return h*60+m;}
function simdiMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}

function aktifDers() {
  const sim = simdiMin();
  for (const ds of SAATLER) {
    const b=sureToMin(ds.bas), e=sureToMin(ds.bit);
    if (sim>=b && sim<=e) return {...ds, durum:"aktif"};
    if (sim<b) return {...ds, durum:"sonraki"};
  }
  return null;
}

function gunAdi() {
  const g = new Date().getDay(); // 0=Pazar
  return TR_GUNLER[g];
}

function bugunFirestoreGun() {
  const g = new Date().getDay();
  return GUNLER[g-1] || null; // Pazar/Cumartesi null
}

function guncelSaat(){
  const n=new Date();
  const saat=String(n.getHours()).padStart(2,"0");
  const dk=String(n.getMinutes()).padStart(2,"0");
  const sn=String(n.getSeconds()).padStart(2,"0");
  document.getElementById("clockTime").textContent=saat+":"+dk+":"+sn;
  document.getElementById("footerSaat").textContent=saat+":"+dk;

  // Tarih
  document.getElementById("clockDate").textContent =
    gunAdi()+" · "+n.getDate()+" "+TR_AYLAR[n.getMonth()+1]+" "+n.getFullYear();

  // Ders saati bilgisi
  const ds = aktifDers();
  const no = document.getElementById("dersSaatiNo");
  const txt = document.getElementById("dersSaatiTxt");
  const kal = document.getElementById("dersSaatiKalan");
  if (!ds) {
    no.textContent="🌙"; txt.textContent="Ders saati dışı"; kal.textContent="";
  } else if (ds.durum==="aktif") {
    const kalanDk = sureToMin(ds.bit)-simdiMin();
    no.textContent = ds.no+". Ders";
    txt.textContent = ds.bas+" – "+ds.bit;
    kal.textContent = "⏱ "+kalanDk+" dk kaldı";
  } else {
    const kalanDk = sureToMin(ds.bas)-simdiMin();
    no.textContent = ds.no+". Ders";
    txt.textContent = "Başlıyor: "+ds.bas;
    kal.textContent = kalanDk+" dk sonra";
  }
}

setInterval(guncelSaat,1000);
guncelSaat();

// ── OKUL BİLGİSİ ──
onSnapshot(doc(db,"ayarlar","okul"), snap=>{
  if(!snap.exists()) return;
  const d=snap.data(); okulData=d;
  if(d.ad) document.getElementById("okulAd").textContent=d.ad;
  if(d.tur) document.getElementById("okulTur").textContent=d.tur;
  if(d.logo){
    const img=document.getElementById("logoImg"), ic=document.getElementById("logoIcon");
    img.src=d.logo; img.style.display="block"; ic.style.display="none";
  }
});

// ── VERİ DİNLEYİCİLER ──
onSnapshot(collection(db,"nobetler"), snap=>{
  nobetler=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderSidePanel(); buildSlides();
});

onSnapshot(query(collection(db,"etut"),orderBy("tarih","asc")), snap=>{
  etutler=snap.docs.map(d=>({id:d.id,...d.data()}));
  buildSlides();
});

onSnapshot(collection(db,"sinavlar"), snap=>{
  sinavlar=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.tarih||"").localeCompare(b.tarih||""));
  buildSlides();
});

onSnapshot(collection(db,"deneme"), snap=>{
  denemeler=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.tarih||"").localeCompare(b.tarih||""));
  buildSlides();
});

onSnapshot(query(collection(db,"duyurular"),orderBy("ts","desc")), snap=>{
  duyurular=snap.docs.map(d=>({id:d.id,...d.data()})).slice(0,5);
  buildSlides();
});

onSnapshot(collection(db,"program"), snap=>{
  programData={};
  snap.docs.forEach(d=>{programData[d.id]=d.data();});
  renderSidePanel(); buildSlides();
});

// Yükleme tamamlandı
setTimeout(()=>{
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("screen").style.display="grid";
}, 2000);

// ── YARDIMCI ──
function bugunTarih(){return new Date().toISOString().split("T")[0];}
function yarinTarih(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split("T")[0];}
function tarihFormat(t){if(!t)return"";const[y,m,g]=t.split("-");return g+"/"+m+"/"+y;}

// Bugün aktif mi kontrol
function bugunMu(tarih){return tarih===bugunTarih();}
function yarinMi(tarih){return tarih===yarinTarih();}
function gelecekMi(tarih){return tarih>=bugunTarih();}

// ── SLAYT İNŞA ──
function buildSlides(){
  const bugun = bugunTarih();
  const bugunGun = bugunFirestoreGun();
  const simdi = simdiMin();
  const yeniSlides = [];

  // 1. BUGÜNKÜ NÖBET — Aktif saat nöbet yeri
  if (bugunGun) {
    const bugunNobetler = nobetler.filter(n=>n.gun===bugunGun);
    if (bugunNobetler.length) {
      yeniSlides.push({
        tip:"nobet",
        icon:"🛡️",
        kategori:"BUGÜN NÖBETÇİ",
        baslik:"Nöbetçi Öğretmenler",
        alt: bugunNobetler.map(n=>n.ogretmen+(n.konum?" · "+n.konum:"")).join(" / "),
        kartlar: bugunNobetler.map(n=>({
          label: n.ogretmen,
          sub: n.konum || "",
          saat: n.saat || ""
        })),
        badge: {renk:"badge-blue", ikon:"📍", yazi: bugunNobetler.map(n=>n.konum).filter(Boolean).join(", ")||"Görevde"}
      });
    }
  }

  // 2. AKTİF DERS SAATİ — Tüm sınıfların mevcut dersi
  const aktDs = aktifDers();
  if (aktDs && aktDs.durum==="aktif" && bugunGun) {
    const aktifDersler=[];
    Object.entries(programData).forEach(([sinif,prog])=>{
      const dersObj = prog[bugunGun]?.[aktDs.no-1];
      const ders = typeof dersObj==="object" ? dersObj.ders : dersObj;
      const ogr = typeof dersObj==="object" ? (dersObj.ogretmen||"") : "";
      if (ders && ders!=="—") aktifDersler.push({sinif,ders,ogretmen:ogr});
    });
    if (aktifDersler.length) {
      yeniSlides.push({
        tip:"ders",
        icon:"📚",
        kategori: aktDs.no+". DERS · "+aktDs.bas+" – "+aktDs.bit,
        baslik:"Şu An Devam Eden Dersler",
        alt:"",
        kartlar: aktifDersler.map(d=>({label:d.sinif, sub:d.ders, saat:d.ogretmen})),
        badge:{renk:"badge-acc",ikon:"⏱",yazi:aktDs.bit+" bitişi"}
      });
    }
  }

  // 3. BUGÜNKÜ ETÜTler
  const bugunEtutler = etutler.filter(e=>e.tarih===bugun);
  bugunEtutler.forEach(e=>{
    const ogrSay = e.ogrencilerDetay?.length || e.ogrenciler?.length || 0;
    yeniSlides.push({
      tip:"etut",
      icon:"📖",
      kategori:"BUGÜN ETÜT",
      baslik: e.baslik || (e.ders+" Etüdü") || "Etüt",
      alt: [e.saat, e.yer, e.ogretmen].filter(Boolean).join(" · "),
      kartlar: ogrSay>0 ? (e.ogrencilerDetay||[]).slice(0,12).map(o=>({label:o.ad,sub:o.sinif})) : [],
      badge:{renk:"badge-pur",ikon:"👨‍🎓",yazi: ogrSay>0?ogrSay+" öğrenci":(e.sinif||"")}
    });
  });

  // 4. BUGÜNKÜ SINAVLAR
  const bugunSinavlar = sinavlar.filter(s=>s.tarih===bugun);
  bugunSinavlar.forEach(s=>{
    yeniSlides.push({
      tip:"sinav",
      icon:"📋",
      kategori:"BUGÜN SINAV",
      baslik: s.ders || "Sınav",
      alt: [s.saat, s.salon, s.ogretmen].filter(Boolean).join(" · "),
      kartlar: (s.siniflar||[]).map(sf=>({label:sf,sub:""})),
      badge:{renk:"badge-red",ikon:"📝",yazi: s.tur==="ulke"?"Ülke Geneli":s.tur==="yazili"?"Yazılı":"Sınav"}
    });
  });

  // 5. BUGÜNKÜ DENEMELER
  const bugunDenemeler = denemeler.filter(d=>d.tarih===bugun);
  bugunDenemeler.forEach(d=>{
    yeniSlides.push({
      tip:"deneme",
      icon:"🎯",
      kategori:"BUGÜN DENEME SINAVI",
      baslik: [d.tur,d.seri].filter(Boolean).join(" – ") || "Deneme Sınavı",
      alt: [d.saat, d.yer].filter(Boolean).join(" · "),
      kartlar: (d.siniflar||[]).map(sf=>({label:sf,sub:""})),
      badge:{renk:"badge-grn",ikon:"⏱",yazi:d.sure||"Tüm Sınıflar"}
    });
  });

  // 6. YARIN OLAN SINAVLAR (hatırlatma)
  const yarinSinav = sinavlar.filter(s=>s.tarih===yarinTarih());
  if (yarinSinav.length) {
    yarinSinav.forEach(s=>{
      yeniSlides.push({
        tip:"sinav",
        icon:"⚠️",
        kategori:"YARIN SINAV — HATIRLATMA",
        baslik: s.ders || "Sınav",
        alt: "Tarih: "+tarihFormat(s.tarih)+" · "+(s.saat||""),
        kartlar: (s.siniflar||[]).map(sf=>({label:sf,sub:""})),
        badge:{renk:"badge-acc",ikon:"📅",yazi:"Yarın "+tarihFormat(s.tarih)}
      });
    });
  }

  // 7. SONRAKİ ETÜTler (bugün sonrası ilk 3)
  const gelecekEtut = etutler.filter(e=>e.tarih>bugun).slice(0,2);
  gelecekEtut.forEach(e=>{
    const ogrSay = e.ogrencilerDetay?.length || e.ogrenciler?.length || 0;
    yeniSlides.push({
      tip:"etut",
      icon:"📖",
      kategori:"YAKLAŞAN ETÜT · "+tarihFormat(e.tarih),
      baslik: e.baslik || (e.ders+" Etüdü"),
      alt: [e.saat, e.yer, e.ogretmen].filter(Boolean).join(" · "),
      kartlar:[],
      badge:{renk:"badge-pur",ikon:"👨‍🎓",yazi:ogrSay>0?ogrSay+" öğrenci":(e.sinif||"")}
    });
  });

  // 8. DUYURULAR
  const aktifDuyurular = duyurular.filter(d=>d.hedef==="tumu"||d.hedef==="ogrenci");
  aktifDuyurular.slice(0,3).forEach(d=>{
    yeniSlides.push({
      tip:"duyuru",
      icon: d.oncelik==="yuksek"?"🔴": d.oncelik==="normal"?"📢":"📌",
      kategori:"DUYURU · "+d.tarihStr,
      baslik: d.baslik,
      alt: d.icerik?.substring(0,150)+(d.icerik?.length>150?"…":""),
      kartlar:[],
      badge:{renk: d.oncelik==="yuksek"?"badge-red":d.oncelik==="normal"?"badge-blue":"badge-acc",
             ikon:"📅", yazi:d.tarihStr||""}
    });
  });

  // Hiç slide yoksa boş ekran
  if (!yeniSlides.length) {
    yeniSlides.push({
      tip:"bos",icon:"🏫",kategori:"",
      baslik: (okulData.ad||"OkulPanel"),
      alt:"Bugün için planlanmış etkinlik bulunmuyor.",
      kartlar:[],badge:null
    });
  }

  slides = yeniSlides;
  renderSlides();
  renderDots();
  if (!slideTimer) startSlideShow();
}

// ── SLAYT RENDER ──
function renderSlides(){
  const area = document.getElementById("slideArea");
  // Mevcut slaytları temizle (progress ve dots dışında)
  Array.from(area.children).forEach(c=>{
    if(!c.classList.contains("slide-progress")&&!c.classList.contains("slide-dots")) c.remove();
  });

  slides.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="slide slide-"+s.tip+(i===slideIndex?" active":"");
    div.id="slide-"+i;

    let html="";
    html += '<div class="slide-icon">'+s.icon+'</div>';
    if(s.kategori) html += '<div class="slide-kategori">'+s.kategori+'</div>';
    html += '<div class="slide-baslik">'+s.baslik+'</div>';
    if(s.alt) html += '<div class="slide-alt">'+s.alt+'</div>';

    if(s.kartlar && s.kartlar.length){
      html += '<div class="slide-cards">';
      s.kartlar.forEach(k=>{
        html += '<div class="mini-card">';
        html += '<div>'+k.label+'</div>';
        if(k.sub) html += '<div style="font-size:12px;color:var(--muted);font-weight:400">'+k.sub+'</div>';
        if(k.saat) html += '<div style="font-size:11px;color:var(--accent);margin-top:2px">'+k.saat+'</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    if(s.badge) html += '<div class="slide-badge '+s.badge.renk+'">'+s.badge.ikon+' '+s.badge.yazi+'</div>';

    div.innerHTML=html;
    area.insertBefore(div, document.getElementById("slideProgress"));
  });
}

function renderDots(){
  const dots=document.getElementById("slideDots");
  dots.innerHTML=slides.map((_,i)=>'<div class="dot'+(i===slideIndex?" active":"")+'" onclick="goSlide('+i+')"></div>').join("");
}

window.goSlide=function(i){
  slideIndex=i; showSlide();
  clearInterval(slideTimer); slideTimer=setInterval(nextSlide,SLIDE_SURE);
};

function showSlide(){
  document.querySelectorAll(".slide").forEach((s,i)=>s.classList.toggle("active",i===slideIndex));
  renderDots();
  startProgress();
}

function nextSlide(){
  slideIndex=(slideIndex+1)%slides.length;
  showSlide();
}

function startSlideShow(){
  slideTimer=setInterval(nextSlide,SLIDE_SURE);
  startProgress();
}

function startProgress(){
  const bar=document.getElementById("slideProgress");
  bar.style.transition="none"; bar.style.width="0%";
  setTimeout(()=>{bar.style.transition="width "+SLIDE_SURE+"ms linear"; bar.style.width="100%";},50);
}

// ── SAĞ PANEL ──
function renderSidePanel(){
  const panel=document.getElementById("sidePanel");
  const bugunGun=bugunFirestoreGun();
  let html="";

  // 1. Bugünkü ders programı
  html += '<div class="side-section">';
  html += '<div class="side-title">📚 Bugünün Ders Programı</div>';
  if (!bugunGun) {
    html += '<div style="color:var(--muted);font-size:12px">Bugün ders yok (hafta sonu).</div>';
  } else {
    const aktDs = aktifDers();
    const simdi = simdiMin();
    let dersBulundu=false;

    Object.keys(programData).sort().forEach(sinif=>{
      const prog=programData[sinif];
      SAATLER.forEach((ds,idx)=>{
        const dersObj=prog[bugunGun]?.[idx];
        const ders=typeof dersObj==="object"?dersObj.ders:dersObj;
        const ogr=typeof dersObj==="object"?(dersObj.ogretmen||")":"";
        if(!ders||ders==="—") return;
        dersBulundu=true;
        const aktif = aktDs && aktDs.no===ds.no && aktDs.durum==="aktif";
        html += '<div class="ders-row'+(aktif?" ders-aktif":"")+'">';
        html += '<span class="ders-saat-badge">'+ds.no+'.</span>';
        html += '<div style="flex:1"><div class="ders-ad">'+ders+'</div>';
        if(ogr) html += '<div class="ders-ogr">'+ogr+'</div>';
        html += '</div>';
        html += '<span class="ders-sinif-badge">'+sinif+'</span>';
        html += '</div>';
      });
    });
    if(!dersBulundu) html+='<div style="color:var(--muted);font-size:12px">Program girilmemiş.</div>';
  }
  html += '</div>';

  // 2. Bugünkü nöbetler
  const bugunNobetler = bugunGun ? nobetler.filter(n=>n.gun===bugunGun) : [];
  html += '<div class="side-section">';
  html += '<div class="side-title">🛡️ Bugünkü Nöbetler</div>';
  if(!bugunNobetler.length) {
    html += '<div style="color:var(--muted);font-size:12px">Kayıtlı nöbet yok.</div>';
  } else {
    bugunNobetler.forEach(n=>{
      html += '<div class="nobet-row">';
      html += '<div class="nobet-ad">'+n.ogretmen+'<div style="font-size:11px;color:var(--muted)">'+(n.brans||"")+'</div></div>';
      html += '<span class="nobet-yer">'+( n.konum||"")+'</span>';
      html += '</div>';
    });
  }
  html += '</div>';

  // 3. Bugünkü etkinlikler
  const bugun=bugunTarih();
  const bugunEtut=etutler.filter(e=>e.tarih===bugun);
  const bugunSinav=sinavlar.filter(s=>s.tarih===bugun);
  const bugunDeneme=denemeler.filter(d=>d.tarih===bugun);
  const hepsi=[
    ...bugunSinav.map(s=>({tip:"sinav",ad:s.ders||"Sınav",saat:s.saat,yer:s.salon||""})),
    ...bugunDeneme.map(d=>({tip:"deneme",ad:[d.tur,d.seri].filter(Boolean).join(" ")||"Deneme",saat:d.saat,yer:d.yer||""})),
    ...bugunEtut.map(e=>({tip:"etut",ad:e.baslik||e.ders||"Etüt",saat:e.saat,yer:e.yer||""})),
  ].sort((a,b)=>(a.saat||"").localeCompare(b.saat||""));

  if(hepsi.length){
    html += '<div class="side-section">';
    html += '<div class="side-title">📅 Bugünkü Etkinlikler</div>';
    hepsi.forEach(e=>{
      const ikon=e.tip==="sinav"?"📋":e.tip==="deneme"?"🎯":"📖";
      html += '<div class="etkinlik-row">';
      html += '<span style="font-size:16px">'+ikon+'</span>';
      html += '<div style="flex:1"><div class="etkinlik-ad">'+e.ad+'</div>';
      if(e.yer) html += '<div class="etkinlik-yer">'+e.yer+'</div>';
      html += '</div>';
      if(e.saat) html += '<span class="etkinlik-saat">'+e.saat+'</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  panel.innerHTML=html;
}

// ── TICKER (alt yazı bandı) ──
function updateTicker(){
  const bugun=bugunTarih();
  const items=[];

  // Yaklaşan sınavlar
  sinavlar.filter(s=>s.tarih>=bugun).slice(0,3).forEach(s=>{
    items.push("📋 "+s.ders+" Sınavı · "+tarihFormat(s.tarih)+(s.siniflar?" · "+s.siniflar.join(", "):""));
  });
  // Yaklaşan denemeler
  denemeler.filter(d=>d.tarih>=bugun).slice(0,2).forEach(d=>{
    items.push("🎯 "+([d.tur,d.seri].filter(Boolean).join(" ")||"Deneme")+" · "+tarihFormat(d.tarih));
  });
  // Duyurular
  duyurular.slice(0,3).forEach(d=>{
    items.push("📢 "+d.baslik);
  });

  if(!items.length) items.push("🏫 "+(okulData.ad||"OkulPanel")+" · İyi dersler!");

  // İki kopya (sonsuz kaydırma için)
  const ticker=document.getElementById("ticker");
  const html=items.map(i=>'<span class="ticker-item">'+i+'</span>').join("");
  ticker.innerHTML=html+html; // double for infinite scroll
}

setInterval(()=>{
  updateTicker();
  renderSidePanel();
  buildSlides();
}, 60000);

setTimeout(updateTicker, 2500);

</script>
